<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Day - Time Blocker</title>    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Theme Variables */
        :root {
            /* Dark Mode (Default) */
            --bg-primary: #1F2937;
            --bg-secondary: #374151;
            --text-primary: #f3f0ee;
            --text-muted: #9ca3af;
            --border-color: rgba(243, 240, 238, 0.15);
            --grid-line: rgba(243, 240, 238, 0.1);
            --btn-bg: rgba(243, 240, 238, 0.1);
            
            /* User specified block colors */
            --color-blue: #6BB9F0;
            --color-peach: #FFCCAA; 
            --color-orange: #FFCD80;
            --color-green: #90D89A;
            --color-yellow: #E0FD8B;
            --color-gray: #9ca3af;
            --color-purple: #D49BE6;
            --color-red: #FF4D4D;
            --event-text: #0f0d0c;
        }

        [data-theme="light"] {
            /* Light Mode */
            --bg-primary: #fdfcfc;
            --bg-secondary: #f3f4f6;
            --text-primary: #0f0d0c;
            --text-muted: #6b7280;
            --border-color: rgba(15, 13, 12, 0.1);
            --grid-line: rgba(15, 13, 12, 0.05);
            --btn-bg: rgba(15, 13, 12, 0.05);

            --color-blue: #6BB9F0;
            --color-peach: #FFCCAA; 
            --color-orange: #FFCD80;
            --color-green: #90D89A;
            --color-yellow: #E0FD8B;
            --color-gray: #9ca3af;
            --color-purple: #D49BE6;
            --color-red: #FF4D4D;
            --event-text: #0f0d0c;
        }

        [data-theme="warm"] {
            /* Warm Mode */
            --bg-primary: #fff8ee;
            --bg-secondary: #f5e6c4;
            --text-primary: #0f0d0c;
            --text-muted: #666666;
            --border-color: rgba(15, 13, 12, 0.1);
            --grid-line: rgba(15, 13, 12, 0.05);
            --btn-bg: rgba(15, 13, 12, 0.05);

            --color-blue: #6BB9F0;
            --color-peach: #FFCCAA; 
            --color-orange: #FFCD80;
            --color-green: #90D89A;
            --color-yellow: #E0FD8B;
            --color-gray: #9ca3af;
            --color-purple: #D49BE6;
            --color-red: #FF4D4D;
            --event-text: #0f0d0c;
        }

        .vertical-text {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen font-sans overflow-x-hidden pb-20 transition-colors duration-500 bg-[var(--bg-primary)] text-[var(--text-primary)]" data-theme="dark">

    <nav class="flex justify-between items-center p-6 border-b border-[var(--border-color)]">
        <div class="flex items-center gap-4">
            <span class="font-bold tracking-widest text-lg">Your Day</span>
        </div>
        
        <div class="flex items-center gap-4">
            <button id="theme-btn" onclick="cycleTheme()" class="flex items-center gap-2 bg-transparent border border-[var(--border-color)] rounded-md px-4 py-2 text-sm text-[var(--text-primary)] hover:bg-[var(--btn-bg)] outline-none cursor-pointer transition-colors shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                <span id="theme-btn-text">Dark Mode</span>
            </button>

            <button id="btn-connect-nav" onclick="handleConnect()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-md">
                <svg id="icon-calendar-nav" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
                <svg id="icon-spinner-nav" class="hidden animate-spin" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                <span id="text-connect-nav">Connect Google Calendar</span>
            </button>

            <div id="status-connected" class="hidden flex items-center gap-2 text-green-500 bg-green-500/10 px-4 py-2 rounded-lg text-sm font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                Calendar Synced
            </div>
        </div>
    </nav>

    <main id="main-content" class="transition-opacity duration-1000 opacity-20 pointer-events-none filter blur-sm">
        <div class="p-8 pb-0 max-w-[1600px] mx-auto">
            <div class="flex flex-col xl:flex-row justify-between items-stretch mb-12 gap-12 border-b border-[var(--border-color)] pb-8 min-h-[160px]">
                <div class="flex flex-col justify-between w-full xl:w-auto">
                    <h1 id="day-title" class="text-6xl font-extrabold tracking-tight uppercase leading-none mt-2">YOUR DAY</h1>
                    <div class="mt-auto pt-8">
                        <h3 class="text-xl font-semibold mb-2 text-[var(--text-primary)]">Day Theme</h3>
                        <input id="day-theme" type="text" placeholder="Enter your day theme..." class="bg-transparent border-none outline-none text-[var(--text-muted)] text-base w-full xl:w-96 p-0 focus:ring-0 placeholder-[var(--text-muted)]/50 transition-colors">
                    </div>
                </div>

                <div class="flex flex-wrap gap-16 justify-start xl:justify-end flex-1">
                    <div class="flex flex-col">
                        <h3 class="text-xl font-semibold mb-6 pb-2 border-b border-[var(--border-color)] inline-block">Today's Hours Per Task</h3>
                        <ul id="todays-hours-list" class="flex flex-col space-y-4">
                            </ul>
                    </div>
                </div>
            </div>

            <div class="relative mt-24 h-[450px]">
                <div id="grid-lines-container" class="absolute inset-0 z-0"></div>
                <div class="absolute bottom-10 left-0 right-0 h-px bg-[var(--grid-line)] z-0 transition-colors"></div>
                <div id="axis-labels-container" class="absolute bottom-2 left-0 right-0 z-0"></div>
                <div id="events-container" class="absolute top-12 bottom-16 left-0 right-0 z-10">
                    </div>
            </div>
        </div>
    </main>

    <div id="connect-overlay" class="fixed inset-0 z-50 flex items-center justify-center pointer-events-none transition-opacity duration-300">
        <div class="bg-[var(--bg-secondary)] border border-[var(--border-color)] p-8 rounded-2xl shadow-2xl text-center max-w-md pointer-events-auto transition-colors">
            <svg class="w-16 h-16 text-blue-500 mx-auto mb-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
            <h2 class="text-2xl font-bold mb-4">Visualize Your Schedule</h2>
            <p class="text-[var(--text-muted)] mb-8">
                Connect your Google Calendar to automatically generate a beautiful, time-blocked daily overview of your tasks and meetings.
            </p>
            <button id="btn-connect-overlay" onclick="handleConnect()" class="w-full flex justify-center items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-4 rounded-xl text-lg font-semibold transition-all shadow-md">
                <svg id="icon-calendar-overlay" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
                <svg id="icon-spinner-overlay" class="hidden animate-spin" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                <span id="text-connect-overlay">Connect Calendar Now</span>
            </button>
        </div>
    </div>

    <script>
        // --- GOOGLE CALENDAR INTEGRATION ---
        const GoogleCalendarConfig = {
            clientId: '333606324134-ph4lh1q78av0skl8d3kdt6jp94vlt6ti.apps.googleusercontent.com',
            apiKey: 'AIzaSyDkxGqusidU_RyWooTkDtpI4_7_v2cFyu4',
            discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'],
            scopes: 'https://www.googleapis.com/auth/calendar.readonly'
        };

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;

// --- GOOGLE API INITIALIZATION ---
        function gapiLoaded() {
            console.log("Google API script loaded, initializing client...");
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            try {
                await gapi.client.init({
                    apiKey: GoogleCalendarConfig.apiKey,
                    discoveryDocs: GoogleCalendarConfig.discoveryDocs,
                });
                gapiInited = true;
                console.log("✅ GAPI Initialized Successfully");
            } catch (error) {
                console.error("❌ GAPI Init Error:", error);
                alert("GAPI Failed to load. Please check the Developer Console.");
            }
        }

        function gisLoaded() {
            console.log("Google Identity Services loaded, initializing token...");
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: GoogleCalendarConfig.clientId,
                    scope: GoogleCalendarConfig.scopes,
                    callback: '', 
                });
                gisInited = true;
                console.log("✅ GIS Initialized Successfully");
            } catch (error) {
                console.error("❌ GIS Init Error:", error);
            }
        }
        
        // --- THEME CYCLE LOGIC ---
        let currentThemeIndex = 0;
        const themeModes = ['dark', 'light', 'warm'];
        const themeLabels = ['Dark Mode', 'Light Mode', 'Warm Mode'];

        function cycleTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themeModes.length;
            const newTheme = themeModes[currentThemeIndex];
            
            document.body.setAttribute('data-theme', newTheme);
            document.getElementById('theme-btn-text').innerText = themeLabels[currentThemeIndex];
        }

        // --- STATE & CONSTANTS ---
        let isConnected = false;
        const TIMELINE_START_MINUTES = 8 * 60; // 8:00 AM
        const TIMELINE_END_MINUTES = 18 * 60;  // 6:00 PM
        const TOTAL_TIMELINE_MINUTES = TIMELINE_END_MINUTES - TIMELINE_START_MINUTES;

        // --- HELPER FUNCTIONS ---
        const timeToMinutes = (timeStr) => {
            const [hours, minutes] = timeStr.split(':').map(Number);
            return hours * 60 + minutes;
        };

        const formatTimeLabel = (timeStr) => {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const displayHours = hours % 12 || 12;
            const displayMinutes = minutes === 0 ? '' : `:${minutes.toString().padStart(2, '0')}`;
            return `${displayHours}${displayMinutes} ${ampm}`;
        };

        function calculateTodaysHours(events) {
            const taskMap = {};
            
            events.forEach(ev => {
                const startMins = timeToMinutes(ev.startTime);
                const endMins = timeToMinutes(ev.endTime);
                const duration = (endMins - startMins) / 60;
                
                const baseCategory = ev.title; 
                if (!taskMap[baseCategory]) {
                    taskMap[baseCategory] = { duration: 0, color: ev.color };
                }
                taskMap[baseCategory].duration += duration;
            });

            return Object.entries(taskMap)
                .map(([title, data]) => ({
                    label: title,
                    color: data.color,
                    duration: data.duration
                }))
                .sort((a, b) => b.duration - a.duration);
        }

        // --- RENDER FUNCTIONS ---
        function renderStaticGrid() {
            const gridHours = Array.from({ length: 11 }, (_, i) => i + 8);
            const gridContainer = document.getElementById('grid-lines-container');
            const axisContainer = document.getElementById('axis-labels-container');
            
            let gridHTML = '';
            let axisHTML = '';

            gridHours.forEach((hour, index) => {
                const percent = (index / (gridHours.length - 1)) * 100;
                
                gridHTML += `<div class="absolute top-0 bottom-0 border-l border-[var(--grid-line)] transition-colors" style="left: ${percent}%"></div>`;
                
                const ampm = hour >= 12 ? 'PM' : 'AM';
                const displayHour = hour > 12 ? hour - 12 : hour;
                axisHTML += `<div class="absolute text-sm text-[var(--text-muted)] font-medium -translate-x-1/2" style="left: ${percent}%">${displayHour}${ampm}</div>`;
            });

            gridContainer.innerHTML = gridHTML;
            axisContainer.innerHTML = axisHTML;
        }

        // --- CONNECT & FETCH LOGIC ---
        function handleConnect() {
            if (!gapiInited || !gisInited) {
                alert("Google APIs are still loading. Please try again in a moment.");
                return;
            }

            document.getElementById('btn-connect-nav').disabled = true;
            document.getElementById('btn-connect-overlay').disabled = true;
            
            document.getElementById('icon-calendar-nav').classList.add('hidden');
            document.getElementById('icon-spinner-nav').classList.remove('hidden');
            document.getElementById('text-connect-nav').innerText = 'Connecting...';

            document.getElementById('icon-calendar-overlay').classList.add('hidden');
            document.getElementById('icon-spinner-overlay').classList.remove('hidden');
            document.getElementById('text-connect-overlay').innerText = 'Authenticating...';

            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    resetConnectUI();
                    throw (resp);
                }
                await fetchCalendarEvents();
            };

            if (gapi.client.getToken() === null) {
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        async function fetchCalendarEvents() {
            try {
                const now = new Date();
                const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0).toISOString();
                const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59).toISOString();

                const response = await gapi.client.calendar.events.list({
                    'calendarId': 'primary',
                    'timeMin': startOfDay,
                    'timeMax': endOfDay,
                    'showDeleted': false,
                    'singleEvents': true,
                    'orderBy': 'startTime',
                });
                
                const events = response.result.items;
                console.log("Successfully fetched events:", events);
                
                renderRealCalendarData(events);
                showSuccessUI();

            } catch (err) {
                console.error("Error fetching calendar events:", err);
                resetConnectUI();
            }
        }

        function renderRealCalendarData(gcalEvents) {
            const colorPalette = [
                'var(--color-blue)', 'var(--color-peach)', 'var(--color-orange)', 
                'var(--color-green)', 'var(--color-yellow)', 'var(--color-purple)', 'var(--color-red)'
            ];
            
            const formattedEvents = gcalEvents.map((ev, index) => {
                const startStr = ev.start.dateTime || ev.start.date;
                const endStr = ev.end.dateTime || ev.end.date;
                const startDate = new Date(startStr);
                const endDate = new Date(endStr);
                
                const startTime = startDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
                const endTime = endDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
                
                return {
                    id: ev.id,
                    title: ev.summary || 'Busy',
                    startTime: startTime,
                    endTime: endTime,
                    color: colorPalette[index % colorPalette.length]
                };
            });

            document.getElementById('day-title').innerText = "TODAY'S SCHEDULE";
            
            const calculatedTodaysHours = calculateTodaysHours(formattedEvents);
            const todaysHoursList = document.getElementById('todays-hours-list');
            todaysHoursList.innerHTML = calculatedTodaysHours.map(item => `
                <li class="flex items-center gap-3 text-[15px] font-medium text-[var(--text-primary)] transition-colors">
                    <span class="w-4 h-4 rounded-full shadow-sm border border-black/10 flex-shrink-0 transition-colors" style="background-color: ${item.color};"></span>
                    <span>${item.label} = ${item.duration.toFixed(1)} Hours</span>
                </li>
            `).join('');

            const eventsContainer = document.getElementById('events-container');
            eventsContainer.innerHTML = formattedEvents.map(event => {
                const startMins = timeToMinutes(event.startTime);
                const endMins = timeToMinutes(event.endTime);
                
                let boundedStart = Math.max(startMins, TIMELINE_START_MINUTES);
                let boundedEnd = Math.min(endMins, TIMELINE_END_MINUTES);
                
                if (boundedStart >= boundedEnd) return ''; 
                
                const leftPercent = ((boundedStart - TIMELINE_START_MINUTES) / TOTAL_TIMELINE_MINUTES) * 100;
                const widthPercent = ((boundedEnd - boundedStart) / TOTAL_TIMELINE_MINUTES) * 100;
                const durationHours = ((boundedEnd - boundedStart) / 60).toFixed(1);

                return `
                    <div class="absolute top-0 bottom-0 rounded-xl border border-black/5 shadow-md group transition-all hover:-translate-y-1 hover:shadow-xl hover:z-20 overflow-hidden"
                         style="background-color: ${event.color}; left: ${leftPercent}%; width: ${widthPercent}%; margin-left: 2px; margin-right: 2px;">
                        
                        <div class="absolute -top-8 left-1/2 -translate-x-1/2 whitespace-nowrap text-sm font-semibold text-[var(--text-primary)] transition-colors">
                            ${durationHours} HRS
                        </div>

                        <div class="absolute inset-0 p-4 vertical-text transition-colors" style="color: var(--event-text);">
                            <div class="font-extrabold text-xl leading-snug break-words tracking-tight">${event.title}</div>
                            <div class="mt-2 text-[13px] font-semibold opacity-80">${formatTimeLabel(event.startTime)} - ${formatTimeLabel(event.endTime)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- UI STATE MANAGERS ---
        function showSuccessUI() {
            isConnected = true;
            
            const overlay = document.getElementById('connect-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.remove(), 300);

            const main = document.getElementById('main-content');
            main.classList.remove('opacity-20', 'pointer-events-none', 'filter', 'blur-sm');
            main.classList.add('opacity-100');

            document.getElementById('btn-connect-nav').classList.add('hidden');
            document.getElementById('status-connected').classList.remove('hidden');
        }

        function resetConnectUI() {
            document.getElementById('btn-connect-nav').disabled = false;
            document.getElementById('btn-connect-overlay').disabled = false;
            
            document.getElementById('icon-calendar-nav').classList.remove('hidden');
            document.getElementById('icon-spinner-nav').classList.add('hidden');
            document.getElementById('text-connect-nav').innerText = 'Connect Google Calendar';

            document.getElementById('icon-calendar-overlay').classList.remove('hidden');
            document.getElementById('icon-spinner-overlay').classList.add('hidden');
            document.getElementById('text-connect-overlay').innerText = 'Connect Calendar Now';
        }

            // --- INITIALIZATION ---
        window.onload = () => {
            renderStaticGrid();
        };
    </script>
    
    <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()" async defer></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()" async defer></script>
</body>
</html>
